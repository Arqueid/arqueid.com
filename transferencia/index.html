<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Marcar</title>
    <style>
        /* 
           GUIA DE CORES E ESTILOS (CSS)
           Para alterar as cores do projeto, modifique os valores hexadecimais abaixo.
        */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #f43f5e;
            --success: #10b981;
            --border-color: rgba(255,255,255,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 30px 15px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-size: 1.8rem;
            color: var(--accent-color);
            text-transform: uppercase;
        }

        /* 
           BARRA DE BUSCA
           Para modificar o tamanho da barra, altere o width aqui.
        */
        .search-bar {
            flex: 1;
            min-width: 250px;
            max-width: 400px;
        }

        .search-bar input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: white;
            outline: none;
        }

        /* 
           FORMULÁRIO DE ADIÇÃO 
           Para adicionar novos campos visuais, insira no HTML e ajuste o grid aqui.
        */
        .input-group {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .input-group input, .input-group select {
            background: var(--bg-color);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            color: white;
            outline: none;
            width: 100%;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: var(--accent-color);
        }

        .input-full {
            grid-column: span 2;
        }

        button.btn-primary {
            background: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            grid-column: span 2;
            transition: 0.2s;
        }

        button.btn-primary:hover {
            opacity: 0.9;
        }

        /* 
           SISTEMA DE ABAS (CATEGORIAS)
        */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tab-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: var(--accent-color);
            color: #0f172a;
            font-weight: bold;
            border-color: var(--accent-color);
        }

        /* 
           GRID DE ITENS (CARDS)
        */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card-cover {
            width: 100%;
            height: 140px;
            background-color: #334155;
            background-size: cover;
            background-position: center;
        }

        .card-body {
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--accent-color);
        }

        .card-type {
            font-size: 0.75rem;
            background: #334155;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 10px;
            align-self: flex-start;
        }

        .card-content {
            font-size: 0.9rem;
            color: var(--text-main);
            word-break: break-all;
            margin-bottom: 15px;
            flex: 1;
        }

        .card-content a {
            color: var(--accent-color);
        }

        .card-tags {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 10px;
        }

        .card-footer {
            display: flex;
            justify-content: flex-end;
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-weight: bold;
        }

        /* Responsividade do Formulário */
        @media (max-width: 600px) {
            .input-group {
                grid-template-columns: 1fr;
            }
            .input-full {
                grid-column: span 1;
            }
            button.btn-primary {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>MARCAR</h1>
        <div class="search-bar">
            <!-- Campo de busca por tags ou nome -->
            <input type="text" id="search-input" placeholder="Buscar por tags ou nome...">
        </div>
    </header>

    <!-- ÁREA DO FORMULÁRIO DE CADASTRO -->
    <div class="input-group">
        <select id="item-type">
            <option value="link">Link</option>
            <option value="texto">Texto</option>
            <option value="imagem">Imagem</option>
            <option value="video">Vídeo</option>
        </select>
        <input type="text" id="item-title" placeholder="Nome / Título da marcação">
        
        <input type="text" id="item-content" class="input-full" placeholder="Cole o Link ou digite o Texto aqui...">
        
        <input type="text" id="item-cover" class="input-full" placeholder="Link da imagem de capa (opcional)">
        
        <input type="text" id="item-tags" class="input-full" placeholder="Tags para busca (ex: tutorial, css, santos, filme)">
        
        <button id="add-btn" class="btn-primary">Salvar Marcação</button>
    </div>

    <!-- ABAS DE NAVEGAÇÃO -->
    <div class="tabs" id="tabs-container">
        <button class="tab-btn active" data-filter="todos">Todos</button>
        <button class="tab-btn" data-filter="texto">Textos</button>
        <button class="tab-btn" data-filter="link">Links</button>
        <button class="tab-btn" data-filter="imagem">Imagens</button>
        <button class="tab-btn" data-filter="video">Vídeos</button>
    </div>

    <!-- LOCAL ONDE OS CARDS APARECEM -->
    <div id="grid" class="grid-container">
        <!-- O JS injeta o conteúdo aqui -->
    </div>
</div>

<script>
    /* 
       GUIA PARA O FUTURO PROGRAMADOR (JAVASCRIPT)
       Este script gerencia o cadastro, exibição, busca e exclusão dos itens salvos no navegador.
    */

    // 1. MAPEAMENTO DE ELEMENTOS HTML
    // Aqui pegamos os IDs do HTML para o JavaScript poder controlá-los.
    const titleInput = document.getElementById('item-title');
    const contentInput = document.getElementById('item-content');
    const coverInput = document.getElementById('item-cover');
    const tagsInput = document.getElementById('item-tags');
    const typeSelect = document.getElementById('item-type');
    const addBtn = document.getElementById('add-btn');
    const searchInput = document.getElementById('search-input');
    const gridContainer = document.getElementById('grid');
    const tabButtons = document.querySelectorAll('.tab-btn');

    // Variável global para saber qual aba está ativa no momento.
    let currentFilter = 'todos';

    // 2. INICIALIZAÇÃO
    // Quando a página carregar, a função updateUI é chamada para listar os itens.
    document.addEventListener('DOMContentLoaded', updateUI);

    // 3. EVENTOS DE CLIQUE E DIGITAÇÃO
    addBtn.addEventListener('click', addItem);
    
    // Busca em tempo real conforme o usuário digita
    searchInput.addEventListener('input', updateUI);

    // Lógica de clique nas abas (Filtros)
    tabButtons.forEach(btn => {
        btn.addEventListener('click', (e) => {
            // Remove a classe 'active' de todos os botões
            tabButtons.forEach(b => b.classList.remove('active'));
            // Adiciona a classe 'active' no botão clicado
            e.target.classList.add('active');
            
            // Pega o valor do atributo 'data-filter' do HTML (ex: 'video', 'texto')
            currentFilter = e.target.getAttribute('data-filter');
            
            // Atualiza a tela com o novo filtro
            updateUI();
        });
    });

    // 4. FUNÇÃO PARA ADICIONAR NOVO ITEM
    // Para adicionar novos dados (ex: uma nova coluna de "autor"), crie a variável aqui e adicione no objeto newItem.
    function addItem() {
        const title = titleInput.value.trim();
        const content = contentInput.value.trim();
        const cover = coverInput.value.trim();
        const tags = tagsInput.value.trim();
        const type = typeSelect.value;

        // Validação simples: exige pelo menos conteúdo
        if (!content) {
            alert('Por favor, preencha pelo menos o link/texto principal.');
            return;
        }

        // Cria o objeto com os dados
        const newItem = {
            id: Date.now(), // Gera um ID único baseado na data/hora
            title: title || 'Sem título',
            content: content,
            cover: cover || '', // Se não tiver capa, fica vazio
            tags: tags,
            type: type
        };

        // Puxa a lista atual, adiciona o novo e salva novamente
        const data = getData();
        data.unshift(newItem); // unshift adiciona no topo (início do array)
        saveData(data);
        
        // Limpa o formulário após salvar
        titleInput.value = '';
        contentInput.value = '';
        coverInput.value = '';
        tagsInput.value = '';
        
        // Atualiza a tela
        updateUI();
    }

    // 5. FUNÇÕES DE BANCO DE DADOS (LocalStorage)
    // O nome 'marcar_dados_v1' é a chave salva no navegador.
    function saveData(data) {
        localStorage.setItem('marcar_dados_v1', JSON.stringify(data));
    }

    function getData() {
        const saved = localStorage.getItem('marcar_dados_v1');
        return saved ? JSON.parse(saved) : [];
    }

    // 6. FUNÇÃO PARA EXCLUIR ITEM
    function deleteItem(id) {
        if (confirm('Excluir esta marcação?')) {
            let data = getData();
            // Filtra removendo o item que tem o ID clicado
            data = data.filter(item => item.id !== id);
            saveData(data);
            updateUI();
        }
    }

    // 7. FUNÇÃO PRINCIPAL DE RENDERIZAÇÃO (Atualizar a Tela)
    // Esta função é o "motor". Ela lê o banco, aplica os filtros (abas) e a busca (texto), e desenha o HTML.
    function updateUI() {
        gridContainer.innerHTML = ''; // Limpa a tela antes de desenhar
        const data = getData();
        const searchTerm = searchInput.value.toLowerCase().trim();

        // Filtra os dados com base na aba e na barra de busca
        const filteredData = data.filter(item => {
            // Filtro da Aba
            const matchTab = (currentFilter === 'todos') || (item.type === currentFilter);
            
            // Filtro da Busca (Procura no título ou nas tags)
            const matchSearch = (item.title.toLowerCase().includes(searchTerm)) || 
                                (item.tags.toLowerCase().includes(searchTerm));

            return matchTab && matchSearch;
        });

        // Se não houver itens após o filtro
        if (filteredData.length === 0) {
            gridContainer.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-dim); padding: 40px;">Nenhuma marcação encontrada.</div>';
            return;
        }

        // Desenha cada item filtrado na tela
        // Para alterar o layout do card HTML, modifique a estrutura abaixo.
        filteredData.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';

            // Define a imagem de capa. Se não tiver, exibe um fundo cinza liso.
            const coverStyle = item.cover ? `background-image: url('${item.cover}');` : '';

            // Formatação do conteúdo: se for link, cria tag <a>, se não, exibe texto puro.
            let displayContent = item.content;
            if (item.content.startsWith('http')) {
                displayContent = `<a href="${item.content}" target="_blank">Acessar Link ↗</a>`;
            }

            // Monta o HTML interno do Card
            card.innerHTML = `
                <div class="card-cover" style="${coverStyle}"></div>
                <div class="card-body">
                    <span class="card-type">${item.type.toUpperCase()}</span>
                    <div class="card-title">${item.title}</div>
                    <div class="card-tags">Tags: ${item.tags || '-'}</div>
                    <div class="card-content">${displayContent}</div>
                    
                    <div class="card-footer">
                        <button class="delete-btn" onclick="deleteItem(${item.id})">Excluir</button>
                    </div>
                </div>
            `;
            
            gridContainer.appendChild(card);
        });
    }
</script>

</body>
</html>
