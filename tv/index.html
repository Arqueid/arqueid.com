<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="../favicon.png">
    <title>Arqueid Tv</title>
    <style>
        /* --- ESTILOS GERAIS DO SITE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* Fundo escuro padrão streaming e texto claro */
        body {
            background-color: #141414;
            color: #e5e5e5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; }

        /* Barras de Navegação - Modificado para tons mais escuros */
        .top-bar {
            background-color: #000000;
            height: 40px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 12px;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }
        .top-bar a { margin-right: 20px; color: #888; transition: color 0.2s; }
        .top-bar a:hover { color: #fff; }

        /* Cabeçalho principal com destaque vermelho */
        .main-header {
            background-color: #000000;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: relative;
            z-index: 100;
            border-bottom: 2px solid #E50914; /* Destaque vermelho estilo Netflix */
        }

        .menu-trigger { display: flex; align-items: center; cursor: pointer; color: #E50914; }
        .hamburger-icon { font-size: 24px; margin-right: 10px; }
        .menu-label { font-weight: bold; font-size: 14px; color: #fff; }

        .search-box { display: flex; align-items: center; }
        .search-box input {
            background-color: #222;
            border: 1px solid #333;
            padding: 8px 12px;
            border-radius: 4px;
            color: #fff;
            outline: none;
            width: 200px;
        }
        .search-box input:focus { border-color: #E50914; }
        .search-icon { margin-left: -30px; color: #888; cursor: pointer; }

        /* Sidebar */
        .sidebar {
            position: fixed; top: 0; left: -300px; width: 300px; height: 100%;
            background-color: #000; box-shadow: 2px 0 10px rgba(0,0,0,0.8);
            transition: left 0.3s ease; z-index: 200; padding-top: 60px;
            border-right: 1px solid #333;
        }
        .sidebar.active { left: 0; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: #fff; }
        .sidebar ul { list-style: none; }
        .sidebar li { border-bottom: 1px solid #222; }
        .sidebar a { display: block; padding: 15px 20px; font-size: 16px; color: #ccc; transition: 0.2s;}
        .sidebar a:hover { background-color: #E50914; color: #fff; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 150; }
        .overlay.active { display: block; }

        /* --- ÁREA DE CONTEÚDO (CARROSSEL) --- */
        .content-area {
            width: 100%;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            flex: 1;
        }

        .categoria-titulo {
            color: #fff;
            font-size: 22px;
            margin-bottom: 15px;
            margin-top: 20px;
            font-weight: bold;
            border-left: 4px solid #E50914; /* Detalhe vermelho */
            padding-left: 10px;
        }

        /* Container do carrossel com scroll horizontal */
        .carrossel {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 20px;
            scroll-behavior: smooth;
        }
        
        /* Oculta a barra de rolagem padrão mas mantém a função */
        .carrossel::-webkit-scrollbar { height: 8px; }
        .carrossel::-webkit-scrollbar-track { background: #111; border-radius: 4px; }
        .carrossel::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .carrossel::-webkit-scrollbar-thumb:hover { background: #E50914; }

        /* Estilo base dos itens do carrossel */
        .item-midia {
            flex: 0 0 auto;
            background-color: #222;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        .item-midia:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.5);
            z-index: 2;
        }

        .item-midia img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Formato Quadrado para TV (400x400 proporção 1:1) */
        .formato-quadrado {
            width: 200px; /* Tamanho base, pode ajustar */
            aspect-ratio: 1 / 1;
        }

        /* Formato Vertical para Filmes (proporção 2:3 estilo poster) */
        .formato-vertical {
            width: 180px; /* Tamanho base */
            aspect-ratio: 2 / 3;
        }

        /* --- MODAL POPUP DO PLAYER --- */
        .modal-player {
            display: none; /* Oculto por padrão */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .modal-player.ativo {
            display: flex;
        }

        .container-video {
            width: 90%;
            max-width: 1000px;
            position: relative;
            background: #000;
            border: 2px solid #333;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        #video-popup {
            width: 100%;
            display: block;
            border-radius: 8px;
        }

        .fechar-modal {
            position: absolute;
            top: -40px;
            right: 0;
            color: #fff;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }

        .fechar-modal:hover { color: #E50914; }

        footer {
            background-color: #000; padding: 20px; text-align: center;
            border-top: 1px solid #222; font-size: 14px; color: #666; margin-top: auto;
        }

    </style>
</head>
<body>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script>
        // --- FUNÇÕES DE MENU E BUSCA ---
        // Exibe ou oculta a barra lateral do menu
        function toggleMenu() {
            const sidebar = document.getElementById('sidebarMenu');
            const overlay = document.querySelector('.overlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        // Executa a busca ao pressionar a tecla Enter
        function verificarEnter(event) {
            if (event.key === "Enter") {
                realizarBusca();
            }
        }

        // Redireciona para a página de busca passando o termo digitado
        function realizarBusca() {
            var termo = document.getElementById('campoBuscaHome').value;
            if (termo) {
                window.location.href = "../busca.html?q=" + encodeURIComponent(termo);
            }
        }

        // --- FUNÇÕES DO PLAYER POPUP ---
        const modal = document.getElementById('modalPlayer');
        const videoElement = document.getElementById('video-popup');
        let hlsInstancia = null; // Variável para armazenar o motor do HLS

        // Função responsável por abrir o popup e iniciar o vídeo
        function abrirPlayer(tipo, urlVideo) {
            // Torna o modal visível
            modal.classList.add('ativo');

            // Limpa instâncias anteriores para evitar erro de reprodução sobreposta
            if (hlsInstancia) {
                hlsInstancia.destroy();
            }

            if (tipo === 'tv') {
                // Lógica para reproduzir arquivos .m3u8 (TV)
                if (Hls.isSupported()) {
                    hlsInstancia = new Hls();
                    hlsInstancia.loadSource(urlVideo);
                    hlsInstancia.attachMedia(videoElement);
                    hlsInstancia.on(Hls.Events.MANIFEST_PARSED, function() {
                        videoElement.play();
                    });
                } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                    // Suporte nativo (ex: navegadores Safari)
                    videoElement.src = urlVideo;
                    videoElement.addEventListener('loadedmetadata', function() {
                        videoElement.play();
                    });
                }
            } else if (tipo === 'filme') {
                // Lógica para reproduzir arquivos .webm ou .mp4 (Filmes)
                videoElement.src = urlVideo;
                videoElement.play();
            }
        }

        // Função responsável por fechar o popup e parar o vídeo completamente
        function fecharPlayer() {
            // Oculta o modal
            modal.classList.remove('ativo');
            
            // Pausa o vídeo
            videoElement.pause();
            
            // Remove a fonte do vídeo para interromper download de dados em segundo plano
            videoElement.src = ""; 
            videoElement.removeAttribute('src'); 
            videoElement.load();
            
            // Destrói a conexão do stream ao vivo, se existir
            if (hlsInstancia) {
                hlsInstancia.destroy();
                hlsInstancia = null;
            }
        }
    </script>
